name: CI

on:
  push:
    branches:
      - main
  pull_request:
  release:
    types:
      - published
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1

      - name: Setup Go
        uses: actions/setup-go@44694675825211faa026b3c33043df3e48a5fa00 # v6.0.0
        with:
          go-version-file: go.mod
          cache: true

      - name: Setup Node.js
        uses: actions/setup-node@2028fbc5c25fe9cf00d9f06a71cc4710d4507903 # v6.0.0
        with:
          node-version: 22
          cache: npm

      - name: Install frontend dependencies
        run: npm ci

      - name: Frontend lint
        run: npm run lint:js

      - name: Install staticcheck
        run: go install honnef.co/go/tools/cmd/staticcheck@v0.6.1

      - name: Staticcheck
        run: $(go env GOPATH)/bin/staticcheck ./...

      - name: Go vet
        run: go vet ./...

      - name: Go test with coverage
        run: go test ./... -coverprofile=coverage.out -covermode=atomic

      - name: Upload coverage artifact
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6.0.0
        with:
          name: coverage-report
          path: coverage.out
          if-no-files-found: error

      - name: Frontend build
        run: npm run build

  coverage-upload:
    runs-on: ubuntu-latest
    needs:
      - test
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Download coverage artifact
        uses: actions/download-artifact@634f93cb2916e3fdff6788551b99b062d0335ce0 # v5.0.0
        with:
          name: coverage-report
          path: .

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@671740ac38dd9b0130fbe1cec585b89eea48d3de # v5.5.2
        with:
          files: coverage.out
          use_oidc: true
          fail_ci_if_error: true

  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    needs:
      - test

    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1

      - name: Setup Go
        uses: actions/setup-go@44694675825211faa026b3c33043df3e48a5fa00 # v6.0.0
        with:
          go-version-file: go.mod
          cache: false

      - name: Setup Node.js
        uses: actions/setup-node@2028fbc5c25fe9cf00d9f06a71cc4710d4507903 # v6.0.0
        with:
          node-version: 22

      - name: Install frontend and e2e dependencies
        run: npm ci

      - name: Frontend build
        run: npm run build

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Run Playwright e2e (smoke on push, full otherwise)
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            npm run e2e:ci -- e2e/auth-login-register.spec.ts e2e/dashboard.spec.ts e2e/theme-dark-mode.spec.ts
          else
            npm run e2e:ci
          fi
        env:
          E2E_APP_PORT: 18080

      - name: Upload Playwright artifacts
        if: failure()
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6.0.0
        with:
          name: playwright-artifacts
          path: |
            playwright-report
            test-results
            .tmp/e2e
          if-no-files-found: ignore

  e2e-postgres-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    needs:
      - test

    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1

      - name: Setup Go
        uses: actions/setup-go@44694675825211faa026b3c33043df3e48a5fa00 # v6.0.0
        with:
          go-version-file: go.mod
          cache: false

      - name: Setup Node.js
        uses: actions/setup-node@2028fbc5c25fe9cf00d9f06a71cc4710d4507903 # v6.0.0
        with:
          node-version: 22

      - name: Install frontend and e2e dependencies
        run: npm ci

      - name: Frontend build
        run: npm run build

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Run Playwright Postgres smoke
        run: npm run e2e:ci:postgres -- e2e/auth-login-register.spec.ts e2e/dashboard.spec.ts e2e/theme-dark-mode.spec.ts
        env:
          E2E_APP_PORT: 18081

      - name: Upload Playwright Postgres artifacts
        if: failure()
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6.0.0
        with:
          name: playwright-postgres-artifacts
          path: |
            playwright-report
            test-results
            .tmp/e2e
          if-no-files-found: ignore

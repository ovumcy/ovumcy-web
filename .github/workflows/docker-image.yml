name: Docker Image

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  attestations: write
  contents: read
  id-token: write
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up QEMU
        uses: docker/setup-qemu-action@ce360397dd3f832beb865e1373c09c0e9f86d70a # v4.0.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Log in to GHCR
        uses: docker/login-action@b45d80f862d83dbcd57f89517bcf500b2ab88fb2 # v4.0.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf # v6.0.0
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=ref,event=branch
            type=ref,event=tag
            type=sha

      - name: Build and push Docker image
        id: build
        uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294 # v7.0.0
        with:
          context: .
          file: Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Select public image reference
        id: public_ref
        shell: bash
        run: |
          set -euo pipefail

          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            echo "value=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "value=latest" >> "$GITHUB_OUTPUT"

      - name: Verify anonymous GHCR pull access
        shell: bash
        env:
          IMAGE_NAME: ghcr.io/${{ github.repository }}
          IMAGE_REF: ${{ steps.public_ref.outputs.value }}
        run: |
          set -euo pipefail

          token_body="$(mktemp)"
          manifest_body="$(mktemp)"
          trap 'rm -f "$token_body" "$manifest_body"' EXIT

          token_status="$(
            curl -sSLo "$token_body" -w '%{http_code}' \
              "https://ghcr.io/token?service=ghcr.io&scope=repository:${GITHUB_REPOSITORY}:pull"
          )"

          if [[ "$token_status" != "200" ]]; then
            echo "::error::Anonymous GHCR token request for ${IMAGE_NAME}:${IMAGE_REF} returned HTTP ${token_status}. Ensure the package is linked to ${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY} and that the package visibility is set to public."
            cat "$token_body"
            exit 1
          fi

          token="$(
            python3 -c 'import json, pathlib, sys; body = json.loads(pathlib.Path(sys.argv[1]).read_text(encoding="utf-8")); print(body.get("token", ""))' "$token_body"
          )"

          if [[ -z "$token" ]]; then
            echo "::error::Anonymous GHCR token response for ${IMAGE_NAME}:${IMAGE_REF} did not include a bearer token."
            cat "$token_body"
            exit 1
          fi

          manifest_status="$(
            curl -sSLo "$manifest_body" -w '%{http_code}' \
              -H "Authorization: Bearer ${token}" \
              -H "Accept: application/vnd.oci.image.index.v1+json,application/vnd.oci.image.manifest.v1+json,application/vnd.docker.distribution.manifest.list.v2+json,application/vnd.docker.distribution.manifest.v2+json" \
              "https://ghcr.io/v2/${GITHUB_REPOSITORY}/manifests/${IMAGE_REF}"
          )"

          if [[ "$manifest_status" != "200" ]]; then
            echo "::error::Anonymous GHCR manifest request for ${IMAGE_NAME}:${IMAGE_REF} returned HTTP ${manifest_status}. Ensure the package is publicly pullable before considering this release published."
            cat "$manifest_body"
            exit 1
          fi

      - name: Install Cosign
        uses: sigstore/cosign-installer@7e8b541eb2e61bf99390e1afd4be13a184e9ebc5 # v3.10.1

      - name: Sign Docker image
        run: cosign sign --yes ghcr.io/${{ github.repository }}@${{ steps.build.outputs.digest }}

      - name: Attest build provenance
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-name: ghcr.io/${{ github.repository }}
          subject-digest: ${{ steps.build.outputs.digest }}
          push-to-registry: true

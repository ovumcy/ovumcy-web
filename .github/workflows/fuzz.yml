name: Fuzz

on:
  schedule:
    # Sundays 15:00 Europe/Moscow (12:00 UTC). Adjust for your timezone.
    - cron: "0 12 * * 0"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  fuzz:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        target:
          - FuzzParseDayDate
          - FuzzParseDayRange
          - FuzzValidatePasswordStrength
          - FuzzNormalizeAuthEmail
          - FuzzNormalizeRecoveryCode
          - FuzzSanitizeOnboardingCycleAndPeriod

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Setup Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
          cache: true

      - name: Fuzz ${{ matrix.target }}
        # -run '^$' skips unit tests; -fuzz runs only the matrix target for 3m.
        run: go test ./internal/services/ -run '^$' -fuzz '^${{ matrix.target }}$' -fuzztime=3m

      - name: Upload crashers
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: fuzz-crashers-${{ matrix.target }}
          path: internal/services/testdata/fuzz/
          if-no-files-found: ignore
          retention-days: 7

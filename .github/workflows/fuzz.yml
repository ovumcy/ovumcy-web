name: Fuzz

on:
  schedule:
    # Sundays 15:00 Europe/Moscow (12:00 UTC). Adjust for your timezone.
    - cron: "0 12 * * 0"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  fuzz:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        target:
          - FuzzParseDayDate
          - FuzzParseDayRange
          - FuzzValidatePasswordStrength
          - FuzzNormalizeAuthEmail
          - FuzzNormalizeRecoveryCode
          - FuzzSanitizeOnboardingCycleAndPeriod

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: go.mod
          cache: true

      - name: Fuzz ${{ matrix.target }}
        # -run '^$' skips unit tests; -fuzz runs only the matrix target for 3m.
        run: go test ./internal/services/ -run '^$' -fuzz '^${{ matrix.target }}$' -fuzztime=3m

      - name: Upload crashers
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: fuzz-crashers-${{ matrix.target }}
          path: internal/services/testdata/fuzz/
          if-no-files-found: ignore
          retention-days: 7

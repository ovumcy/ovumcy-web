services:
  ovumcy:
    image: ${OVUMCY_IMAGE:-ghcr.io/ovumcy/ovumcy-web:v0.7.2}
    pull_policy: always
    environment:
      TZ: ${TZ:-UTC}
      DEFAULT_LANGUAGE: ${DEFAULT_LANGUAGE:-en}
      DB_DRIVER: ${DB_DRIVER:-sqlite}
      SECRET_KEY: ${SECRET_KEY:-}
      SECRET_KEY_FILE: ${SECRET_KEY_FILE:-}
      DB_PATH: /app/data/ovumcy.db
      DATABASE_URL: ${DATABASE_URL:-}
      COOKIE_SECURE: "true"
      RATE_LIMIT_LOGIN_MAX: ${RATE_LIMIT_LOGIN_MAX:-8}
      RATE_LIMIT_LOGIN_WINDOW: ${RATE_LIMIT_LOGIN_WINDOW:-15m}
      RATE_LIMIT_FORGOT_PASSWORD_MAX: ${RATE_LIMIT_FORGOT_PASSWORD_MAX:-8}
      RATE_LIMIT_FORGOT_PASSWORD_WINDOW: ${RATE_LIMIT_FORGOT_PASSWORD_WINDOW:-1h}
      RATE_LIMIT_API_MAX: ${RATE_LIMIT_API_MAX:-300}
      RATE_LIMIT_API_WINDOW: ${RATE_LIMIT_API_WINDOW:-1m}
      TRUST_PROXY_ENABLED: "true"
      PROXY_HEADER: X-Forwarded-For
      TRUSTED_PROXIES: 172.30.0.8/29
    init: true
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    read_only: true
    tmpfs:
      - /tmp
    volumes:
      - ovumcy_data:/app/data
      # Optional: mount a file-backed app secret and set SECRET_KEY_FILE=/run/secrets/ovumcy_secret_key in .env
      # - ./secrets/ovumcy_secret_key:/run/secrets/ovumcy_secret_key:ro
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8080/healthz >/dev/null || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    networks:
      - internal
    restart: unless-stopped

  nginx:
    image: nginx:1.27.5-alpine3.21
    pull_policy: always
    depends_on:
      ovumcy:
        condition: service_healthy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./certs:/etc/nginx/certs:ro
    networks:
      - internal
    restart: unless-stopped

networks:
  internal:
    driver: bridge
    ipam:
      config:
        - subnet: 172.30.0.8/29

volumes:
  ovumcy_data:

{{define "nav_user_identity_chip"}}
<a
  id="{{.ElementID}}"
  href="/settings#settings-account"
  class="role-chip nav-user-chip{{if .Block}} block{{end}}{{if not (hasDisplayName .CurrentUser)}} nav-user-chip-empty{{end}}"
  title="{{if hasDisplayName .CurrentUser}}{{userIdentity .CurrentUser}}{{else}}{{t .Messages "nav.profile_name_hint"}}{{end}}"
  aria-label="{{if hasDisplayName .CurrentUser}}{{userIdentity .CurrentUser}}{{else}}{{t .Messages "nav.profile_name_hint"}}{{end}}"
  {{if .SwapOOB}}hx-swap-oob="outerHTML"{{end}}>
  <span class="nav-user-chip-icon" aria-hidden="true">👤</span>
  {{if hasDisplayName .CurrentUser}}
  <span class="role-chip-identity nav-user-chip-label" data-current-user-identity>{{userIdentity .CurrentUser}}</span>
  {{end}}
</a>
{{end}}
